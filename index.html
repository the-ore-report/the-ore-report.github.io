<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Ore Report</title>
  <meta name="description" content="A newsletter on the major news shaping the mining industry." />
  <style>
    :root {
      --bg: #0f1115;
      --surface: #161a21;
      --text: #f2f3f5;
      --muted: #9aa3ad;
      --accent: #c8772e;
      --accent-hover: #b3661f;
      --border: #262b33;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin: 0 0 1rem;
      font-weight: 700;
    }

    /* ===== EDIT YOUR TAGLINE: the line below the title ===== */
    .tagline {
      font-size: clamp(1.05rem, 3.5vw, 1.25rem);
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 2.5rem;
    }

    .subscribe {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 0.85rem 2.25rem;
      border-radius: 8px;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    .subscribe:hover { background: var(--accent-hover); }
    .subscribe:active { transform: translateY(1px); }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>The Ore Report</h1>

      <!-- ===== EDIT THIS LINE to change your tagline ===== -->
      <p class="tagline">A newsletter on the major news shaping the mining industry.</p>

      <!--
        ===== PASTE YOUR REAL BEEHIIV LINK BELOW =====
        Replace  https://YOUR-BEEHIIV-URL-HERE  with your Beehiiv subscribe page URL.
      -->
      <a class="subscribe" href="https://YOUR-BEEHIIV-URL-HERE">Subscribe</a>
    </div>
  </main>

  <footer>
    &copy; <span id="year">2026</span> The Ore Report
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
